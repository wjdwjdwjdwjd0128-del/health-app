<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="현장HEALTH">
<title>현장HEALTH</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--red:#C62828;--red-bg:#FFEBEE;--orange:#E8580A;--orange-bg:#FFF0E8;--orange-mid:#FFA05A;--green:#2E7D32;--green-bg:#E8F5E9;--blue:#185FA5;--blue-bg:#E6F1FB;--amber:#854F0B;--amber-bg:#FAEEDA;--navy:#1A2744;--gray:#6B7280;--gray-bg:#F5F5F5;--border:#E5E7EB;--white:#fff;--page:#F7F8FA;}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--page)}
#app{font-size:14px;height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--page)}
.screen{display:none;flex-direction:column;height:100%}
.screen.active{display:flex}
.login-top{background:var(--navy);padding:36px 24px 28px;text-align:center;flex-shrink:0}
.login-logo{font-size:26px;font-weight:700;color:#fff}
.login-logo b{color:var(--orange-mid)}
.login-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:5px}
.login-body{padding:20px;flex:1;overflow-y:auto}
.lsection{margin-bottom:16px}
.lsec-title{font-size:11px;font-weight:700;color:var(--gray);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.role-card{background:var(--white);border:2px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .18s}
.role-card.sel{border-color:var(--orange);background:var(--orange-bg)}
.role-card i{font-size:24px;color:var(--gray);display:block;margin-bottom:5px}
.role-card.sel i{color:var(--orange)}
.role-card-name{font-size:13px;font-weight:700;color:var(--navy)}
.role-card-desc{font-size:10px;color:var(--gray);margin-top:2px}
.qr-btn{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.qr-btn:active{filter:brightness(.85)}
.or-div{display:flex;align-items:center;gap:10px;margin:10px 0;color:var(--gray);font-size:12px}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border)}
.ac-wrap{position:relative}
.ac-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:var(--white)}
.ac-input:focus{border-color:var(--orange)}
.ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border:1.5px solid var(--orange);border-radius:10px;overflow:hidden;z-index:20;display:none;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.ac-list.open{display:block}
.ac-row{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.ac-row:last-child{border-bottom:none}
.ac-row:active{background:var(--orange-bg)}
.ac-av{width:30px;height:30px;border-radius:50%;background:var(--orange);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ac-name{font-size:13px;font-weight:700;color:var(--navy)}
.ac-sub{font-size:10px;color:var(--gray)}
.btn-login{width:100%;padding:14px;background:var(--orange);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px}
.btn-login:disabled{background:#ccc;cursor:not-allowed}
/* QR 스캐너 */
.qr-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:200;display:none;flex-direction:column}
.qr-screen.open{display:flex}
.qr-bar{background:var(--navy);padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.qr-bar-title{font-size:15px;font-weight:700;color:#fff;flex:1}
.qr-close{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:13px;font-weight:700;padding:7px 14px;border-radius:20px;cursor:pointer}
.qr-vid-wrap{flex:1;position:relative;overflow:hidden}
#qr-video{width:100%;height:100%;object-fit:cover}
.qr-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.qr-frame{width:210px;height:210px;border:3px solid var(--orange);border-radius:16px;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
.qr-hint{color:#fff;font-size:13px;font-weight:700;margin-top:18px;text-align:center;line-height:1.6}
.qr-foot{background:var(--navy);padding:12px;text-align:center;color:rgba(255,255,255,.75);font-size:12px;flex-shrink:0}
/* 공통 */
.topbar{background:var(--navy);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-user{font-size:11px;color:rgba(255,255,255,.65)}
.btn-out{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:11px;padding:5px 10px;border-radius:20px;cursor:pointer}
.bottomnav{background:var(--white);border-top:1px solid var(--border);display:flex;flex-shrink:0}
.nb{flex:1;border:none;background:none;padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gray);font-size:10px}
.nb.active{color:var(--orange)}
.nb i{font-size:21px}
.content{flex:1;padding:14px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:15px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:11px;display:flex;align-items:center;gap:6px}
.card-title i{font-size:15px;color:var(--orange)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:var(--gray-bg);border-radius:12px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--navy)}
.stat-lbl{font-size:11px;color:var(--gray);margin-top:2px}
.stat-num.red{color:var(--red)}
.stat-num.amber{color:var(--amber)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.pill-red{background:var(--red-bg);color:var(--red)}
.pill-amber{background:var(--amber-bg);color:var(--amber)}
.pill-green{background:var(--green-bg);color:var(--green)}
.sos-btn{width:100%;padding:0;border:none;background:var(--red);border-radius:16px;cursor:pointer;margin-bottom:12px}
.sos-inner{padding:18px;display:flex;align-items:center;justify-content:center;gap:10px}
.sos-btn:active{filter:brightness(.88)}
.rrow{display:flex;align-items:flex-start;justify-content:space-between;padding:12px;background:var(--white);border-radius:10px;border:1px solid var(--border);margin-bottom:8px}
.rrow.urgent{border-left:4px solid var(--red);border-radius:0 10px 10px 0}
.rrow.watch{border-left:4px solid var(--amber);border-radius:0 10px 10px 0}
.rr-name{font-size:13px;font-weight:700;color:var(--navy)}
.rr-detail{font-size:11px;color:var(--gray);margin-top:2px;line-height:1.5}
.rr-time{font-size:10px;color:var(--gray);text-align:right;white-space:nowrap;margin-left:8px;flex-shrink:0}
.chk-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.chk-item:last-child{border-bottom:none}
.chk-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);background:var(--white);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:12px}
.chk-box.on{background:var(--orange);border-color:var(--orange);color:#fff}
.chk-label{font-size:13px;color:var(--navy);line-height:1.4}
.sym-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sym-item{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;position:relative;transition:all .15s}
.sym-item.on{border-color:var(--red);background:var(--red-bg)}
.sym-icon{font-size:18px;margin-bottom:3px}
.sym-label{font-size:11px;font-weight:700;color:var(--navy)}
.sym-item.on .sym-label{color:var(--red)}
.sym-ck{position:absolute;top:5px;right:5px;width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:9px}
.sym-item.on .sym-ck{background:var(--red);border-color:var(--red);color:#fff}
.res-box{border-radius:12px;padding:14px;text-align:center;margin-bottom:10px}
.res-box.safe{background:var(--green-bg);border:1px solid #A5D6A7}
.res-box.caution{background:var(--amber-bg);border:1px solid #FFCC80}
.res-box.danger{background:var(--red-bg);border:1px solid #FFCDD2}
.res-box .ri{font-size:26px;margin-bottom:4px}
.res-box .rt{font-size:14px;font-weight:700;margin-bottom:4px}
.res-box.safe .rt{color:var(--green)}
.res-box.caution .rt{color:var(--amber)}
.res-box.danger .rt{color:var(--red)}
.res-box .rd{font-size:11px;line-height:1.6;color:#555}
.wrow{display:flex;align-items:center;gap:10px;padding:11px;background:var(--white);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer}
.wrow:active{background:var(--gray-bg)}
.wav{width:36px;height:36px;border-radius:50%;background:var(--orange);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.aid-item{border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border);background:var(--white)}
.aid-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.aid-num{width:22px;height:22px;border-radius:50%;background:var(--orange);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
.modal{background:var(--white);border-radius:16px;width:100%;padding:20px;max-width:380px;max-height:90vh;overflow-y:auto}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--gray);margin-bottom:5px;font-weight:700}
.form-row select,.form-row textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none;font-family:inherit;background:var(--white)}
.form-row textarea{resize:none;height:72px;line-height:1.5}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn-cancel{flex:1;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);font-size:13px;font-weight:700;color:var(--gray);cursor:pointer}
.btn-submit{flex:2;padding:12px;border:none;border-radius:10px;background:var(--red);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.btn-sm{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--white);font-size:11px;font-weight:700;color:var(--navy);cursor:pointer}
.btn-sm.p{background:var(--orange);color:#fff;border-color:var(--orange)}
.sec-head{font-size:11px;font-weight:700;color:var(--gray);margin:14px 0 8px;display:flex;align-items:center;gap:5px}
.sec-head i{font-size:14px;color:var(--orange)}
.greeting{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:4px}
.date-chip{display:inline-flex;align-items:center;gap:5px;background:var(--orange-bg);color:var(--orange);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:14px}
.alist{list-style:none}
.alist li{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:#444;line-height:1.5}
.alist li:last-child{border-bottom:none}
.alist li i{font-size:15px;color:var(--orange);flex-shrink:0;margin-top:1px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.prow:last-child{border-bottom:none}
.prow-lbl{font-size:13px;color:var(--gray);display:flex;align-items:center;gap:7px}
.prow-lbl i{font-size:16px;color:var(--orange)}
.prow-val{font-size:13px;font-weight:700;color:var(--navy)}
</style>
</head>
<body>
<div id="app">

<!-- 로그인 -->
<div class="screen active" id="s-login">
  <div class="login-top">
    <div class="login-logo">⛑ 현장<b>HEALTH</b></div>
    <div class="login-sub">건설현장 보건관리 시스템</div>
  </div>
  <div class="login-body">
    <div class="lsection">
      <div class="lsec-title">역할 선택</div>
      <div class="role-cards">
        <div class="role-card sel" id="rc-worker" onclick="selRole('worker')">
          <i class="ti ti-hard-hat"></i>
          <div class="role-card-name">근로자</div>
          <div class="role-card-desc">건강신고·증상체크</div>
        </div>
        <div class="role-card" id="rc-manager" onclick="selRole('manager')">
          <i class="ti ti-stethoscope"></i>
          <div class="role-card-name">보건관리자</div>
          <div class="role-card-desc">현황관리·대응</div>
        </div>
      </div>
    </div>
    <div id="qr-section">
      <button class="qr-btn" onclick="startQR('login')">
        <i class="ti ti-qrcode" style="font-size:20px"></i>
        내 QR 코드로 로그인
      </button>
      <div class="or-div">또는 이름으로 검색</div>
    </div>
    <div class="lsection">
      <div class="ac-wrap">
        <input class="ac-input" id="li-name" placeholder="이름 입력 (예: 권산호)" autocomplete="off" oninput="onAC()" onkeydown="onACkey(event)">
        <div class="ac-list" id="ac-list"></div>
      </div>
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()" disabled>로그인</button>
    <p style="font-size:11px;color:var(--gray);text-align:center;margin-top:12px;line-height:1.7">※ 이름이 검색되지 않으면 현장사무소 내선 100</p>
  </div>
</div>

<!-- QR 스캐너 -->
<div class="qr-screen" id="s-qr">
  <div class="qr-bar">
    <div class="qr-bar-title" id="qr-title">QR 코드 스캔</div>
    <button class="qr-close" onclick="stopQR()">닫기</button>
  </div>
  <div class="qr-vid-wrap">
    <video id="qr-video" playsinline muted></video>
    <canvas id="qr-canvas" style="display:none"></canvas>
    <div class="qr-overlay">
      <div class="qr-frame"></div>
      <div class="qr-hint">QR 코드를 네모 안에 맞춰주세요</div>
    </div>
  </div>
  <div class="qr-foot" id="qr-status">카메라를 QR 코드에 가져다 대세요</div>
</div>

<!-- 근로자 앱 -->
<div class="screen" id="s-worker">
  <div class="topbar">
    <div class="topbar-title"><i class="ti ti-hard-hat"></i><span id="w-topname"></span></div>
    <div class="topbar-right">
      <span class="topbar-user" id="w-topdept"></span>
      <button class="btn-out" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div class="content" id="w-content"></div>
  <div class="bottomnav">
    <button class="nb active" id="wb-home" onclick="wTab('home',this)"><i class="ti ti-home"></i>홈</button>
    <button class="nb" id="wb-heat" onclick="wTab('heat',this)"><i class="ti ti-thermometer"></i>온열증상</button>
    <button class="nb" id="wb-first" onclick="wTab('first',this)"><i class="ti ti-first-aid-kit"></i>응급처치</button>
    <button class="nb" id="wb-profile" onclick="wTab('profile',this)"><i class="ti ti-user-circle"></i>내정보</button>
  </div>
</div>

<!-- 보건관리자 앱 -->
<div class="screen" id="s-manager">
  <div class="topbar">
    <div class="topbar-title"><i class="ti ti-stethoscope"></i>보건관리자</div>
    <div class="topbar-right">
      <span class="topbar-user" id="m-topname"></span>
      <button class="btn-out" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div class="content" id="m-content"></div>
  <div class="bottomnav">
    <button class="nb active" id="mb-dash" onclick="mTab('dash',this)"><i class="ti ti-layout-dashboard"></i>현황</button>
    <button class="nb" id="mb-reports" onclick="mTab('reports',this)"><i class="ti ti-alert-triangle"></i>신고현황</button>
    <button class="nb" id="mb-workers" onclick="mTab('workers',this)"><i class="ti ti-users"></i>근로자</button>
    <button class="nb" id="mb-guide" onclick="mTab('guide',this)"><i class="ti ti-book"></i>대응지침</button>
  </div>
</div>

<!-- SOS 모달 -->
<div class="modal-ov" id="sos-modal" style="display:none">
  <div class="modal">
    <div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:7px">
      <i class="ti ti-urgent" style="color:var(--red);font-size:18px"></i>응급 신고
    </div>
    <div class="form-row"><label>증상 / 사고 유형</label>
      <select id="sos-type">
        <option>온열질환 의심</option><option>흉부불편감·두근거림</option>
        <option>두통·어지러움</option><option>외상·타박상</option>
        <option>골절 의심</option><option>낙상·추락</option><option>기타</option>
      </select>
    </div>
    <div class="form-row"><label>상세 증상 / 상황</label>
      <textarea id="sos-detail" placeholder="현재 상태를 간단히 적어주세요"></textarea>
    </div>
    <div id="sos-loc" style="font-size:11px;color:var(--gray);background:var(--gray-bg);border-radius:8px;padding:10px;line-height:1.8"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSOS()">취소</button>
      <button class="btn-submit" onclick="submitSOS()">즉시 신고</button>
    </div>
  </div>
</div>

</div>
<script>
// ════════════════════════════════════
// 근로자 명단 — userId = QR의 userId 값
// ════════════════════════════════════
const WORKERS=[
  {userId:'408069',id:'W001',name:'권산호',dept:'토목1팀',role:'일반근로자',age:38,blood:'A형',disease:'없음',phone:'010-1234-5678',emergency:'010-9999-1111',emergencyName:'권OO(배우자)',risk:'safe'},
  {userId:'100002',id:'W002',name:'이철민',dept:'철근팀',role:'반장',age:52,blood:'O형',disease:'당뇨',phone:'010-2345-6789',emergency:'010-8888-2222',emergencyName:'이OO(배우자)',risk:'danger'},
  {userId:'100003',id:'W003',name:'박민준',dept:'토목2팀',role:'일반근로자',age:31,blood:'B형',disease:'없음',phone:'010-3456-7890',emergency:'010-7777-3333',emergencyName:'박OO(배우자)',risk:'safe'},

// ── QR 스캐너 ──
function startQR(mode){
  QM=mode;
  document.getElementById('qr-title').textContent=mode==='login'?'내 QR 코드로 로그인':'건강체크 QR 스캔';
  document.getElementById('s-qr').classList.add('open');
  document.getElementById('qr-status').textContent='카메라를 QR 코드에 가져다 대세요';
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(stream=>{
      QSTR=stream;
      const v=document.getElementById('qr-video');
      v.srcObject=stream; v.play();
      v.onloadedmetadata=()=>scanLoop();
    }).catch(()=>{
      document.getElementById('qr-status').textContent='카메라 권한이 필요합니다. 브라우저 설정에서 허용해주세요.';
    });
}
function scanLoop(){
  const v=document.getElementById('qr-video'),c=document.getElementById('qr-canvas');
  if(v.readyState===v.HAVE_ENOUGH_DATA){
    c.width=v.videoWidth; c.height=v.videoHeight;
    const ctx=c.getContext('2d'); ctx.drawImage(v,0,0,c.width,c.height);
    const img=ctx.getImageData(0,0,c.width,c.height);
    const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
    if(code){handleQR(code.data);return;}
  }
  QAF=requestAnimationFrame(scanLoop);
}
function handleQR(raw){
  stopQR();
  let data;
  try{data=JSON.parse(raw);}catch(e){alert('QR을 인식할 수 없습니다.\n이름으로 검색해 주세요.');return;}
  const worker=WORKERS.find(w=>String(w.userId)===String(data.userId)||w.name===data.dsUser);
  if(!worker){alert(`등록되지 않은 근로자입니다.\n이름(${data.dsUser||'미확인'})으로 검색하거나\n현장사무소 내선 100에 문의하세요.`);return;}
  loginAs(worker,'worker');
  if(QM==='health') setTimeout(()=>wTab('heat',document.getElementById('wb-heat')),100);
}
function stopQR(){
  if(QAF){cancelAnimationFrame(QAF);QAF=null;}
  if(QSTR){QSTR.getTracks().forEach(t=>t.stop());QSTR=null;}
  document.getElementById('s-qr').classList.remove('open');
}

    <div class="stat-grid"><div class="stat-box"><div class="stat-num red">${dng}</div><div class="stat-lbl">위험 근로자</div></div><div class="stat-box"><div class="stat-num amber">${cau}</div><div class="stat-lbl">관찰 근로자</div></div></div>
    <div class="card" style="background:var(--blue-bg);border-color:#90CAF9"><div class="card-title"><i class="ti ti-qrcode" style="color:var(--blue)"></i>현장 입구 QR 건강체크</div><div style="font-size:11px;color:var(--gray);margin-bottom:10px">근로자 QR 스캔 → 온열증상 체크 화면 즉시 시작</div><button class="qr-btn" style="background:var(--blue);margin:0" onclick="startQR('health')"><i class="ti ti-qrcode" style="font-size:18px"></i>QR 스캔 시작</button></div>
    <div class="sec-head"><i class="ti ti-bell"></i>최근 신고</div>${rec}
    <div class="card" style="margin-top:4px"><div class="card-title"><i class="ti ti-temperature"></i>온도별 작업 기준</div>${[['30°C 미만','정상작업','var(--green)'],['30~33°C','매시 10분 휴식','#E65100'],['33~35°C','매시 15분 휴식','#BF360C'],['35°C 이상','작업 중지 검토','var(--red)']].map(([t,l,c])=>`<div style="display:flex;align-items:center;gap:8px;padding:7px;background:var(--gray-bg);border-radius:7px;margin-bottom:5px"><span style="font-size:11px;font-weight:700;min-width:66px;color:${c}">${t}</span><div style="flex:1;height:7px;border-radius:3px;background:${c}"></div><span style="font-size:10px;color:var(--gray);min-width:72px;text-align:right">${l}</span></div>`).join('')}</div>`;
}

function mReports(){
  const rows=REPORTS.map((r,i)=>`<div class="rrow ${r.status}"><div style="flex:1"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span class="rr-name">${r.worker}</span><span class="badge badge-${r.status==='urgent'?'red':'amber'}">${r.status==='urgent'?'응급':'관찰'}</span></div><div class="rr-detail">${r.type}<br>${r.detail}</div><div style="margin-top:6px"><button class="btn-sm ${r.handled?'':'p'}" onclick="tHandle(${i})">${r.handled?'처리취소':'처리완료'}</button></div></div><div class="rr-time">${r.time}</div></div>`).join('');
  return`<div class="sec-head"><i class="ti ti-alert-triangle"></i>신고 현황 (총 ${REPORTS.length}건)</div>${rows||'<div style="text-align:center;color:var(--gray);padding:30px;font-size:13px">신고 내역이 없습니다</div>'}`;
}
function tHandle(i){REPORTS[i].handled=!REPORTS[i].handled;renderM();}

function mWorkers(){
  const rM={safe:['pill-green','정상'],caution:['pill-amber','관찰'],danger:['pill-red','위험']};
  const rows=WORKERS.map(w=>{const[pc,pl]=rM[w.risk];return`<div class="wrow" onclick="wDetail('${w.userId}')"><div class="wav">${w.name[0]}</div><div><div style="font-size:13px;font-weight:700;color:var(--navy)">${w.name}</div><div style="font-size:11px;color:var(--gray);margin-top:1px">${w.dept}·${w.age}세${w.disease!=='없음'?' · ⚠ '+w.disease:''}</div></div><div style="margin-left:auto"><span class="pill ${pc}">${pl}</span></div></div>`;}).join('');
  return`<div class="sec-head"><i class="ti ti-users"></i>전체 근로자 (${WORKERS.length}명)</div>${rows}`;
}
function wDetail(uid){const w=WORKERS.find(x=>x.userId===uid);if(!w)return;alert(`[ ${w.name} 상세정보 ]\n\n소속: ${w.dept}\n직책: ${w.role}\n나이: ${w.age}세\n혈액형: ${w.blood}\n기저질환: ${w.disease}\n연락처: ${w.phone}\n사원번호: ${w.userId}\n\n비상연락: ${w.emergencyName}\n${w.emergency}`);}

function mGuide(){
  const guides=[{b:'badge-red',bt:'열사병',t:'열사병 대응 지침',items:['즉시 119 신고','환자를 시원한 곳으로 이동','의복 제거 후 냉각 처치','의식 있으면 찬물 천천히 제공','회복될 때까지 모니터링']},{b:'badge-amber',bt:'열탈진',t:'열탈진 대응 지침',items:['시원한 곳에서 누운 자세로 휴식','다리 올려 혈액순환 도움','이온음료·물 보충','30분 내 호전 없으면 병원 이송']},{b:'badge-blue',bt:'고혈압',t:'고혈압 위기 대응',items:['즉시 작업 중단 및 안정','혈압 재측정 (180/120 이상 시 응급)','진정시키고 119 신고','약 복용 여부 확인']}];
  return`<div class="sec-head"><i class="ti ti-book"></i>응급 대응 지침</div>
    ${guides.map(g=>`<div class="card" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:7px;margin-bottom:10px"><span class="badge ${g.b}">${g.bt}</span><span style="font-size:13px;font-weight:700;color:var(--navy)">${g.t}</span></div><ol style="padding-left:18px">${g.items.map(i=>`<li style="font-size:12px;color:var(--gray);padding:3px 0;line-height:1.5">${i}</li>`).join('')}</ol></div>`).join('')}
    <div class="card" style="background:var(--blue-bg);border-color:#90CAF9"><div class="card-title"><i class="ti ti-phone-call"></i>주요 연락처</div><ul class="alist"><li><i class="ti ti-urgent" style="color:var(--red)"></i><div><strong>응급</strong> — 119</div></li><li><i class="ti ti-building"></i><div><strong>현장사무소</strong> — 내선 100</div></li><li><i class="ti ti-stethoscope"></i><div><strong>보건관리자 직통</strong> — 010-0000-0200</div></li><li><i class="ti ti-map-pin"></i><div><strong>AED 위치</strong> — A동 1층 로비, B동 입구</div></li></ul></div>`;
}
</script>
</body>
</html>
